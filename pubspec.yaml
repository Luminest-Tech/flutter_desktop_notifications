name: flutter_desktop_notifications
description: "Native desktop notifications for Flutter on Windows, macOS, and Linux. One unified API for title, body, images, buttons, replies, and click/dismiss callbacks."
version: 1.1.1
homepage: https://luminest.io/pages/docs-windows-notifications
repository: https://github.com/Luminest-Tech/flutter_desktop_notifications
issue_tracker: https://github.com/Luminest-Tech/flutter_desktop_notifications/issues

topics:
  - notifications
  - desktop
  - windows
  - macos
  - linux

screenshots:
  - description: "A toast whose hero image is a live Flutter widget, rendered with WidgetToImage."
    path: screenshots/toast-hero.png
  - description: "An inline reply box with Reply and Dismiss action buttons."
    path: screenshots/toast-reply.png
  - description: "A determinate progress bar with a status line."
    path: screenshots/toast-progress.png
  - description: "A simple title and body toast."
    path: screenshots/toast-simple.png
  - description: "A reminder scenario with an attribution line."
    path: screenshots/toast-reminder.png
  - description: "An alarm scenario with Snooze and Dismiss buttons."
    path: screenshots/toast-alarm.png
  - description: "An urgent toast that bypasses Focus Assist."
    path: screenshots/toast-urgent.png
  - description: "A silent toast with an attribution line."
    path: screenshots/toast-silent.png
  - description: "A toast that protocol-launches a URL when its body is tapped."
    path: screenshots/toast-link.png
  - description: "A meeting reminder built from hand-written toast XML with a snooze selector."
    path: screenshots/toast-custom-xml.png

environment:
  sdk: ^3.3.0
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  # Linux notifications over the freedesktop D-Bus spec (pure Dart, no native).
  desktop_notifications: ^0.6.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: WindowsNotificationPluginCApi
        dartPluginClass: WindowsDesktopNotifications
      macos:
        pluginClass: FlutterDesktopNotificationsPlugin
        dartPluginClass: MacosDesktopNotifications
      linux:
        dartPluginClass: LinuxDesktopNotifications
