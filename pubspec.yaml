name: flutter_windows_notification
description: "Send native Windows toast notifications from Flutter, with structured support for actions, inputs, and activation/dismissal callbacks."
version: 1.0.0

topics:
  - windows
  - notifications
  - toast
  - desktop
  - winrt

environment:
  sdk: ^3.3.0
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: WindowsNotificationPluginCApi
